apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-backend
spec:
  replicas: 2 # Rodar 2 cópias para nunca ficar fora do ar
  selector:
    matchLabels:
      app: movie-backend
  template:
    metadata:
      labels:
        app: movie-backend
    spec:
      containers:
        - name: movie-backend
          image: italo12346/movie-backend:v1.0 # Sua imagem do Docker Hub!
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: movie-secrets
                  key: database-url
---
apiVersion: v1
kind: Service
metadata:
  name: movie-backend-service
spec:
  selector:
    app: movie-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
